<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartz Link - Characters</title>
    <link rel="stylesheet" href="characters.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Texture layers -->
    <div class="texture-overlay"></div>
    <div class="stain stain-1"></div>
    <div class="stain stain-2"></div>
    <div class="stain stain-3"></div>

    <div class="container">

        <!-- Back Button -->
        <div class="back-nav">
            <button class="back-btn" onclick="window.location.href='../home/Home.html'" aria-label="Back to Home">
                <span class="back-arrow">&#8592;</span>
                <span>Home</span>
            </button>
        </div>

        <!-- Title Section -->
        <div class="title-section">
            <h1 class="main-title">
                <span class="title-heart">&#9829;</span> Characters
            </h1>
            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-diamond"></span>
                <span class="divider-line"></span>
            </div>
            <p class="subtitle">Forge Your Legend</p>
        </div>

        <!-- Emblem -->
        <div class="emblem">
            <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M30 5 L52 15 L52 32 C52 42 42 52 30 57 C18 52 8 42 8 32 L8 15 Z"
                      stroke="#4a2f18" stroke-width="1.5" fill="none" opacity="0.6"/>
                <path d="M30 44 C30 44 18 34 18 26 C18 22 21 19 25 19 C27.5 19 29.5 20.5 30 22 C30.5 20.5 32.5 19 35 19 C39 19 42 22 42 26 C42 34 30 44 30 44Z"
                      fill="#cc9f38" opacity="0.5"/>
                <line x1="30" y1="12" x2="30" y2="18" stroke="#4a2f18" stroke-width="1" opacity="0.4"/>
                <line x1="27" y1="15" x2="33" y2="15" stroke="#4a2f18" stroke-width="1" opacity="0.4"/>
            </svg>
        </div>

        <!-- Navigation -->
        <nav class="nav-grid nav-grid-2col">
            <button class="nav-btn" data-page="create-character" aria-label="Create Character">
                <span class="btn-icon">&#x270D;&#xFE0F;</span>
                <span class="btn-label">Create Character</span>
            </button>
            <button class="nav-btn" data-page="characters-list" aria-label="Characters">
                <span class="btn-icon">&#x2694;&#xFE0F;</span>
                <span class="btn-label">Characters</span>
            </button>
        </nav>

        <!-- Footer -->
        <div class="divider divider-bottom">
            <span class="divider-line"></span>
            <span class="divider-diamond"></span>
            <span class="divider-line"></span>
        </div>
        <p class="footer-note">Where every heart is linked by fate</p>

    </div>

    <!-- Characters List Modal/Section (hidden by default) -->
    <div class="characters-list-overlay" id="charactersListOverlay">
        <div class="characters-list-panel">
            <div class="panel-header">
                <h2 class="panel-title">Your Characters</h2>
                <button class="close-panel-btn" id="closePanelBtn" aria-label="Close">&#10005;</button>
            </div>
            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-diamond"></span>
                <span class="divider-line"></span>
            </div>

            <div class="characters-grid" id="charactersGrid">
                <!-- Characters will be dynamically inserted here -->
            </div>

            <div class="empty-state" id="emptyState">
                <span class="empty-icon">&#x1F4DC;</span>
                <p class="empty-text">No characters yet. Begin your journey by creating one.</p>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <p class="confirm-text">Are you sure you want to delete this character? This action cannot be undone.</p>
            <div class="confirm-actions">
                <button class="confirm-btn confirm-yes" id="confirmYes">Delete</button>
                <button class="confirm-btn confirm-no" id="confirmNo">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="./characters.js"></script>
</body>
</html>
